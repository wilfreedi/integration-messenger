services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: chat-sync-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_PORT: ${APP_PORT:-8080}
      APP_DEBUG: ${APP_DEBUG:-1}
      APP_BOOTSTRAP_DEMO_DATA: ${APP_BOOTSTRAP_DEMO_DATA:-1}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-chat_sync}
      DB_USER: ${DB_USER:-chat_sync}
      DB_PASSWORD: ${DB_PASSWORD:-chat_sync}
      BITRIX_CONNECTOR_MODE: ${BITRIX_CONNECTOR_MODE:-stub}
      BITRIX_WEBHOOK_TOKEN: ${BITRIX_WEBHOOK_TOKEN:-}
      BITRIX_MANAGEMENT_TOKEN: ${BITRIX_MANAGEMENT_TOKEN:-}
      BITRIX_DEFAULT_CHANNEL_PROVIDER: ${BITRIX_DEFAULT_CHANNEL_PROVIDER:-telegram}
      TELEGRAM_CONNECTOR_MODE: ${TELEGRAM_CONNECTOR_MODE:-stub}
      TELEGRAM_GATEWAY_BASE_URL: ${TELEGRAM_GATEWAY_BASE_URL:-http://telegram-gateway:8090}
      TELEGRAM_GATEWAY_TOKEN: ${TELEGRAM_GATEWAY_TOKEN:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - .:/app
    working_dir: /app

  telegram-gateway:
    build:
      context: ./services/telegram-gateway
      dockerfile: Dockerfile
    container_name: chat-telegram-gateway
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_MANAGER_ACCOUNT_EXTERNAL_ID: ${TELEGRAM_MANAGER_ACCOUNT_EXTERNAL_ID:-telegram-manager-account}
      TELEGRAM_DEFAULT_CRM_PROVIDER: ${TELEGRAM_DEFAULT_CRM_PROVIDER:-bitrix}
      TELEGRAM_GATEWAY_PORT: ${TELEGRAM_GATEWAY_PORT:-8090}
      TELEGRAM_GATEWAY_CORE_WEBHOOK_URL: ${TELEGRAM_GATEWAY_CORE_WEBHOOK_URL:-http://app:8080/api/webhooks/channel-message}
      TELEGRAM_GATEWAY_CORE_WEBHOOK_TOKEN: ${TELEGRAM_GATEWAY_CORE_WEBHOOK_TOKEN:-}
      TELEGRAM_GATEWAY_TDJSON_LIB_PATH: ${TELEGRAM_GATEWAY_TDJSON_LIB_PATH:-/usr/local/lib/libtdjson.so}
      TELEGRAM_GATEWAY_TDLIB_DB_DIR: ${TELEGRAM_GATEWAY_TDLIB_DB_DIR:-/data/tdlib}
      TELEGRAM_GATEWAY_TDLIB_FILES_DIR: ${TELEGRAM_GATEWAY_TDLIB_FILES_DIR:-/data/files}
      TELEGRAM_GATEWAY_LOG_LEVEL: ${TELEGRAM_GATEWAY_LOG_LEVEL:-INFO}
    ports:
      - "${TELEGRAM_GATEWAY_PORT:-8090}:8090"
    volumes:
      - telegram-tdlib-data:/data

  postgres:
    image: postgres:16-alpine
    container_name: chat-sync-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-chat_sync}
      POSTGRES_USER: ${DB_USER:-chat_sync}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chat_sync}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-chat_sync} -d ${DB_NAME:-chat_sync}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  telegram-tdlib-data:
